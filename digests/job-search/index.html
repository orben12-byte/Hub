<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Search — Orbit</title>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#F5F3F0; --surface:#FFFFFF; --border:#E8E3DC; --text:#111; --muted:#6B6B6B; --accent:#4F46E5; }
    @media (prefers-color-scheme: dark) { :root { --bg:#141414; --surface:#1E1E1E; --border:#2E2E2E; --text:#F0F0F0; --muted:#9A9A9A; --accent:#818CF8; } }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Rubik',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
    main{max-width:720px;margin:0 auto;padding:36px 24px 60px;}
    .back{font-size:13px;font-weight:600;color:var(--accent);text-decoration:none;}
    h1{font-size:24px;margin:18px 0 4px;}
    .sub{font-size:14px;color:var(--muted);margin-bottom:28px;}
    .item{display:block;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px 20px;margin-bottom:12px;text-decoration:none;color:var(--text);transition:background 150ms;}
    .item:hover{background:var(--border);}
    .item-title{font-size:15px;font-weight:600;}
    .item-date{font-size:12px;color:var(--muted);margin-top:3px;}
    .empty{font-size:14px;color:var(--muted);padding:24px 4px;}
  </style>
</head>
<body>
  <main>
    <a class="back" href="../../">← Orbit</a>
    <h1>Job Search</h1>
    <div class="sub">משרות עיצוב חדשות מאתרי הדרושים — Product Designer, UX/UI ועוד.</div>
    <div id="list"><div class="empty">אין גיליונות עדיין.</div></div>
  </main>
  <script>
    fetch('manifest.json').then(r => r.ok ? r.json() : []).then(list => {
      if (!Array.isArray(list) || !list.length) return;
      const html = list.map(it => {
        const t = (it.headline && it.headline.trim()) ? it.headline : it.title;
        return '<a class="item" href="' + it.file + '" target="_blank" rel="noopener"><div class="item-title">' + t + '</div><div class="item-date">' + (it.date || '') + '</div></a>';
      }).join('');
      document.getElementById('list').innerHTML = html;
    }).catch(e => console.warn('[Orbit] job-search archive', e));
  </script>
</body>
</html>
